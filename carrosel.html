<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./carrosel.css">
    <link rel="stylesheet" href="./css/principal.css">
    <title>Document</title>
</head>
<body>
    <section id="portfolio" class="portfolio-section">
        <div class="portfolio-header py-5">
            <div class="container text-center">
                <div class="about-title-box mt-5">
                    <h2 class="titlePRJ m-0">PROJETOS</h2>
                </div>
            </div>
        </div>

        <div class="portfolio-filters d-flex justify-content-center gap-4 mt-5 mb-5">
            <button class="filter-btn active" data-filter="todos">TODOS</button>
            <button class="filter-btn" data-filter="codados">CONCLUÍDOS</button>
            <button class="filter-btn" data-filter="design">APENAS DESIGN</button>
        </div>


        <div id="carouselExampleFade" class="carousel slide carousel-fade">
            <div class="carousel-inner">
                <div class="carousel-item active d-flex justify-content-center" data-category="codados">
                    <img src="./assets/imagens_projeto/image 13.png" class="d-block w-50" alt="...">
                </div>
                <div class="carousel-item d-flex justify-content-center" data-category="design">
                    <img src="./assets/imagens_projeto/frameviewNOVAER.png" class="d-block w-50" alt="...">
                </div>
                <div class="carousel-item d-flex justify-content-center" data-category="design">
                    <img src="./assets/imagens_projeto/frameview.png" class="d-block w-50" alt="...">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./logicaCarrosel.js"></script>

</body>
</html>
