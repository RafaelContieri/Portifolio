<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;       /* Garante que o container ocupe a largura total */
    padding: 0 15px;   /* Adiciona um respiro nas laterais em telas mobile */
    box-sizing: border-box;
}

.ld_01 {
    max-width: 1200px; /* Define o tamanho máximo que ela pode chegar (Desktop) */
    width: 100%;       /* Faz ela ocupar 100% da largura disponível em telas menores */
    height: auto;      /* Mantém a proporção da imagem para não achatar */
    display: block;
}

.voltarbtn{
    background-color: #D0CA17;
    border: none;
    color: white;
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 5px;
    color: black;
    font-weight: 600;
}
.btn{
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
}
</style>
<body>

    <div class="btn"><button onclick="window.location.href='./index.html';" class="voltarbtn" >VOLTAR</button></div>
    
    <div class="container">
    <img class="ld_01" src="./assets/imagens_projeto/Frame 1.png" alt="Descrição do Projeto">
</div>
    
   
</body>
</html>
